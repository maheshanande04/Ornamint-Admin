<div class="dashboard-content-wrap">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12 responsive-column-half">
                <div class="card card-item">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center pb-4">
                            <h3 class="fs-18 font-weight-semi-bold">Pending KYC Users List: </h3>
                            <!-- <span class="fs-15 cursor-pointer">View all</span> -->
                        </div>
                        <div class="notification-body">
                            <div class="table-responsive mb-5">
                                <table class="table generic-table mb-3 text-center">
                                    <thead>
                                    <tr>
                                         <th scope="col">Username</th>
                                        <th scope="col">Name</th>
                                        <!-- <th scope="col">Phone</th> -->
                                        <th scope="col">Status</th>
                                        <!-- <th scope="col">KYC Status</th>
                                        <th scope="col">Bank Status</th> -->
                                        <th scope="col">Action</th>
                                    </tr>
                                    </thead>
                                    
                                    <tbody>
                                    <tr *ngFor="let item of userlist; let i = index">
                                         
                                        
                                        <td>
                                            <ul class="generic-list-item">
                                                <li>{{item.username}}</li>
                                            </ul>
                                        </td>
                                            <!-- <td>
                                                <ul class="generic-list-item">
                                                    <li>{{item.email}}</li>
                                                </ul>
                                            </td>-->
                                            <td>
                                                <ul class="generic-list-item">
                                                    <li>{{item.panFullName}}</li>
                                                </ul>
                                            </td> 
                                        <td>
                                            <ul class="generic-list-item">
                                                <!-- <li>{{item.isVerified}}</li> -->
                                                <li *ngIf="item.aadharVerified== '2'">Pending</li>
                                            </ul>
                                        </td>
                                        <!-- <td>
                                            <ul class="generic-list-item">
                                                <li *ngIf="item.kycstatus== '0'">Pending</li>
                                                <li *ngIf="item.kycstatus== '1'">Approved</li>
                                                <li *ngIf="item.kycstatus=='3'">Not Uploaded</li>
                                            </ul>
                                        </td>
                                        <td>
                                            <ul class="generic-list-item">
                                                 <li *ngIf="item.bankstatus=='0'">Pending</li>
                                                <li *ngIf="item.bankstatus=='1'">Approved</li>
                                                <li *ngIf="item.bankstatus=='3'">Not Uploaded</li>
                                            </ul>
                                        </td> -->
                                        <td>
                                            <ul class="generic-list-item">
                                                <li (click)="userdetails(item)" style="cursor: pointer;"><i class="fa fa-edit"></i></li>
                                            </ul>
                                        </td>
                                    </tr>
                                    </tbody>
                                   
                                </table>
                                <div class="text-center">
                                    <div *ngIf="!loading">
                                        <!-- Pagination buttons -->
                                        <ul class="pagination justify-content-center">
                                          <li class="page-item" [class.disabled]="currentPage === 1" style="margin: 10px;">
                                            <a (click)="changePage(currentPage - 1)" class="previous" style="background-color:white !important;cursor: pointer;">&laquo; Previous</a>
                                          </li>
                                          <li class="page-item" *ngFor="let pageNumber of visiblePageNumbers">
                                            <a class="page-link" [class.active]="pageNumber === currentPage" (click)="changePage(pageNumber)" href="javascript:void(0);">
                                              {{ pageNumber }}
                                            </a>
                                          </li>
                                          <li class="page-item" [class.disabled]="currentPage === totalPages" style="margin: 10px;">
                                            <a (click)="changePage(currentPage + 1)" class="next" style="background-color:white !important;cursor: pointer;">Next &raquo;</a>
                                          </li>
                                        </ul>
                                      </div>
                                 </div>
                            </div>
                        </div>
                    </div>
                </div><!-- end card -->
            </div><!-- end col-lg-5 -->
        </div><!-- end row -->
    </div><!-- end container-fluid -->
</div><!-- end dashboard-content-wrap -->
